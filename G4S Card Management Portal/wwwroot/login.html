<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>G4S Card Management – Login</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
</head>
<body class="min-h-screen bg-gradient-to-br from-slate-900 to-blue-950 flex items-center justify-center p-4">

    <div class="bg-white rounded-2xl shadow-2xl w-full max-w-sm p-8">
        <!-- Logo / Header -->
        <div class="text-center mb-8">
            <div class="inline-flex items-center justify-center w-16 h-16 rounded-full bg-blue-900 mb-4">
                <i class="fa-solid fa-id-card-clip text-white text-2xl"></i>
            </div>
            <h1 class="text-2xl font-bold text-gray-900">Card Management</h1>
            <p class="text-sm text-gray-500 mt-1">Sign in to your account</p>
        </div>

        <!-- Error message -->
        <div id="errorBox" class="hidden mb-4 p-3 bg-red-50 border border-red-200 rounded-lg text-sm text-red-700 flex items-center gap-2">
            <i class="fa-solid fa-circle-exclamation"></i>
            <span id="errorText"></span>
        </div>

        <!-- Form -->
        <div class="space-y-4">
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">Username</label>
                <div class="relative">
                    <i class="fa-solid fa-user absolute left-3 top-1/2 -translate-y-1/2 text-gray-400 text-sm"></i>
                    <input type="text" id="username" placeholder="Enter username"
                           class="w-full pl-9 pr-4 py-2.5 border border-gray-300 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent"
                           onkeydown="if(event.key==='Enter') login()">
                </div>
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">Password</label>
                <div class="relative">
                    <i class="fa-solid fa-lock absolute left-3 top-1/2 -translate-y-1/2 text-gray-400 text-sm"></i>
                    <input type="password" id="password" placeholder="Enter password"
                           class="w-full pl-9 pr-4 py-2.5 border border-gray-300 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent"
                           onkeydown="if(event.key==='Enter') login()">
                </div>
            </div>
            <button id="btnLogin" onclick="login()"
                    class="w-full bg-blue-900 hover:bg-blue-800 text-white font-bold py-2.5 rounded-lg transition mt-2 flex items-center justify-center gap-2">
                <i class="fa-solid fa-right-to-bracket"></i> Sign In
            </button>
        </div>
    </div>

    <script>
        // If already logged in, redirect straight to the app
        const stored = sessionStorage.getItem('currentUser');
        if (stored) window.location.replace('/index.html');

        async function login() {
            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value;
            const btn = document.getElementById('btnLogin');
            const errorBox = document.getElementById('errorBox');
            const errorText = document.getElementById('errorText');

            if (!username || !password) {
                errorText.textContent = 'Please enter both username and password.';
                errorBox.classList.remove('hidden');
                return;
            }

            btn.disabled = true;
            btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> Signing in...';
            errorBox.classList.add('hidden');

            try {
                const res = await fetch('/api/Auth/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password })
                });

                if (res.ok) {
                    const user = await res.json();
                    sessionStorage.setItem('currentUser', JSON.stringify(user));
                    window.location.replace('/index.html');
                } else {
                    const msg = await res.text();
                    errorText.textContent = msg || 'Invalid username or password.';
                    errorBox.classList.remove('hidden');
                }
            } catch (err) {
                errorText.textContent = 'Could not connect to the server. Please try again.';
                errorBox.classList.remove('hidden');
            } finally {
                btn.disabled = false;
                btn.innerHTML = '<i class="fa-solid fa-right-to-bracket"></i> Sign In';
            }
        }
    </script>
</body>
</html>
